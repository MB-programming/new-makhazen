<script>
// ── Load competition settings ─────────────────────────────
(function loadSettings() {
  fetch('api/registration.php?check=1')
    .then(r => r.json())
    .catch(() => null);

  fetch('api/get_data.php')
    .then(r => r.json())
    .then(d => {
      const s = d.settings || {};
      if (s.comp_title)    document.getElementById('comp-title').textContent    = s.comp_title;
      if (s.comp_subtitle) document.getElementById('comp-subtitle').textContent = s.comp_subtitle;

      // Check if competition is closed
      if (s.comp_active === '0') {
        document.getElementById('closed-msg').style.display = 'block';
        document.getElementById('reg-form').style.display   = 'none';
      }
    })
    .catch(() => {});
})();

// ── Validation helpers ────────────────────────────────────
const rules = {
  full_name:   v => v.trim().length >= 3 || 'الاسم الكامل لا يقل عن 3 أحرف',
  email:       v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()) || 'البريد الإلكتروني غير صحيح',
  phone:       v => /^05\d{8}$/.test(v.trim()) || 'الجوال يبدأ بـ 05 ويكون 10 أرقام',
  national_id: v => /^[12]\d{9}$/.test(v.trim()) || 'الهوية 10 أرقام وتبدأ بـ 1 أو 2',
  city:        v => v.trim().length > 0 || 'يرجى اختيار المدينة',
  gender:      () => {
    const val = document.querySelector('input[name="gender"]:checked')?.value;
    return val ? true : 'يرجى اختيار الجنس';
  },
  terms:       () => document.getElementById('terms').checked || 'يجب الموافقة على الشروط والأحكام',
};

function showError(field, msg) {
  const el = document.getElementById('err-' + field);
  const inp = document.getElementById(field);
  if (!el) return;
  if (msg) {
    el.textContent = msg;
    el.classList.add('show');
    if (inp) inp.classList.add('error');
  } else {
    el.classList.remove('show');
    if (inp) inp.classList.remove('error');
  }
}

function validateAll() {
  let valid = true;
  ['full_name','email','phone','national_id','city','gender','terms'].forEach(field => {
    const el  = document.getElementById(field);
    const val = el ? el.value : '';
    const res = rules[field](val);
    if (res !== true) { showError(field, res); valid = false; }
    else              { showError(field, ''); }
  });
  return valid;
}

// Live validation on blur
['full_name','email','phone','national_id','city'].forEach(field => {
  const el = document.getElementById(field);
  if (!el) return;
  el.addEventListener('blur', () => {
    const res = rules[field](el.value);
    showError(field, res !== true ? res : '');
  });
  el.addEventListener('input', () => {
    if (el.classList.contains('error')) {
      const res = rules[field](el.value);
      if (res === true) showError(field, '');
    }
  });
});

document.querySelectorAll('input[name="gender"]').forEach(r =>
  r.addEventListener('change', () => showError('gender', ''))
);
document.getElementById('terms').addEventListener('change', () => showError('terms', ''));

// ── Phone: allow digits only ──────────────────────────────
document.getElementById('phone').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});
document.getElementById('national_id').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});

// ── Confetti ──────────────────────────────────────────────
function fireConfetti() {
  const count = 200, defaults = { origin: { y: 0.6 } };
  function fire(ratio, opts) {
    confetti(Object.assign({}, defaults, opts, {
      particleCount: Math.floor(count * ratio)
    }));
  }
  fire(0.25, { spread: 26, startVelocity: 55 });
  fire(0.20, { spread: 60 });
  fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
  fire(0.10, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
  fire(0.10, { spread: 120, startVelocity: 45 });
}

// ── Show success SweetAlert ───────────────────────────────
function showSuccess(data) {
  fireConfetti();
  setTimeout(fireConfetti, 800);

  Swal.fire({
    background: '#1a1a1a',
    color: '#f0f0f0',
    showConfirmButton: true,
    confirmButtonText: 'حسناً 🎉',
    confirmButtonColor: '#FFCF06',
    allowOutsideClick: false,
    customClass: { popup: 'swal2-popup', confirmButton: 'swal-confirm-btn' },
    html: `
      <div class="swal-congrats">
        <div class="big-icon"><i class="fas fa-award" style="color:#FFCF06"></i></div>
        <h2>تهانينا يا ${escHtml(data.full_name.split(' ')[0])}!</h2>
        <p class="sub-msg">${escHtml(data.success_msg || 'شكراً لتسجيلك في ' + data.comp_title)}</p>
        <div class="swal-ref-card">
          <div class="ref-row">
            <i class="fas fa-user"></i>
            <span>الاسم</span>
            <span class="ref-val">${escHtml(data.full_name)}</span>
          </div>
          <div class="ref-row">
            <i class="fas fa-hashtag"></i>
            <span>رقم المرجع</span>
            <span class="ref-val" style="color:#FFCF06">${escHtml(data.ref_number)}</span>
          </div>
          <div class="ref-row">
            <i class="fas fa-calendar-check"></i>
            <span>تاريخ التسجيل</span>
            <span class="ref-val">${escHtml(data.date)}</span>
          </div>
        </div>
      </div>`,
    didOpen: () => {
      // Add inline style for swal popup since it's out of scope
      const popup = document.querySelector('.swal2-popup');
      if (popup) {
        popup.style.fontFamily = "'Tajawal', sans-serif";
        popup.style.direction  = 'rtl';
        popup.style.borderRadius = '20px';
        popup.style.border = '1px solid rgba(255,207,6,0.25)';
        popup.style.maxWidth = '480px';
      }
    },
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Form submit ───────────────────────────────────────────
document.getElementById('reg-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  if (!validateAll()) {
    const firstErr = this.querySelector('.field-input.error, .field-error.show');
    if (firstErr) firstErr.scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  const gender = document.querySelector('input[name="gender"]:checked')?.value;

  try {
    const res = await fetch('api/registration.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        full_name:   document.getElementById('full_name').value.trim(),
        email:       document.getElementById('email').value.trim(),
        phone:       document.getElementById('phone').value.trim(),
        national_id: document.getElementById('national_id').value.trim(),
        city:        document.getElementById('city').value,
        gender,
        terms:       document.getElementById('terms').checked,
      }),
    });
    const data = await res.json();

    if (data.success) {
      this.style.display = 'none';
      showSuccess(data);
    } else {
      Swal.fire({
        icon: 'error',
        title: 'تنبيه',
        text: data.message || 'حدث خطأ، يرجى المحاولة مجدداً',
        confirmButtonText: 'حسناً',
        confirmButtonColor: '#FFCF06',
        background: '#1a1a1a',
        color: '#f0f0f0',
        customClass: { popup: 'swal2-popup' },
        didOpen: () => {
          const p = document.querySelector('.swal2-popup');
          if (p) { p.style.fontFamily="'Tajawal',sans-serif"; p.style.direction='rtl'; }
        },
      });
    }
  } catch {
    Swal.fire({
      icon: 'error',
      title: 'خطأ في الاتصال',
      text: 'تعذّر الاتصال بالخادم، يرجى المحاولة لاحقاً',
      confirmButtonText: 'حسناً',
      confirmButtonColor: '#FFCF06',
      background: '#1a1a1a',
      color: '#f0f0f0',
    });
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
